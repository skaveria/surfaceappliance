<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Alarm Clock</title>

  <style>
    :root {
      --bg: #080b0c;
      --panel: #101819;
      --glass: #142225;
      --vfd: #79fff2;
      --vfd-soft: #1bded0;
      --text-dim: #8bb9b6;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 45%, #162326 0%, #080b0c 58%, #030404 100%);
      color: var(--vfd);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.035) 0px,
        rgba(255,255,255,0.035) 1px,
        transparent 1px,
        transparent 5px
      );
      opacity: 0.18;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 0%, transparent 55%, rgba(0,0,0,0.55) 100%);
    }

    #app {
      width: min(92vw, 1100px);
      padding: clamp(22px, 5vw, 58px);
      text-align: center;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.015)),
        var(--panel);
      border: 1px solid rgba(121,255,242,0.18);
      box-shadow:
        0 0 28px rgba(27,222,208,0.16),
        inset 0 0 38px rgba(121,255,242,0.06),
        0 30px 90px rgba(0,0,0,0.7);
      position: relative;
    }

    #app::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 18px;
      border: 1px solid rgba(121,255,242,0.08);
      pointer-events: none;
    }

    #label {
      margin-bottom: 1.6vw;
      color: var(--text-dim);
      font-size: clamp(12px, 1.6vw, 22px);
      letter-spacing: 0.42em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    #time {
      font-size: clamp(74px, 14vw, 190px);
      line-height: 0.95;
      letter-spacing: -0.08em;
      color: var(--vfd);
      text-shadow:
        0 0 4px rgba(121,255,242,0.95),
        0 0 14px rgba(121,255,242,0.72),
        0 0 34px rgba(27,222,208,0.55),
        0 0 72px rgba(27,222,208,0.28);
      filter: saturate(1.2);
    }

    #seconds {
      font-size: 0.34em;
      letter-spacing: -0.03em;
      opacity: 0.72;
      margin-left: 0.18em;
      vertical-align: baseline;
    }

    #weather {
      margin-top: clamp(16px, 2.6vw, 34px);
      font-size: clamp(22px, 4vw, 54px);
      color: #b8fffa;
      opacity: 0.82;
      text-shadow:
        0 0 4px rgba(121,255,242,0.7),
        0 0 18px rgba(27,222,208,0.32);
    }

    #date {
      margin-top: clamp(10px, 1.5vw, 20px);
      font-size: clamp(14px, 2vw, 28px);
      color: var(--text-dim);
      opacity: 0.72;
      letter-spacing: 0.08em;
    }

    .colon {
      animation: pulse 2s steps(1, end) infinite;
    }

    @keyframes pulse {
      50% {
        opacity: 0.25;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="label">local chronometer</div>
    <div id="time">--<span class="colon">:</span>--<span id="seconds">--</span></div>
    <div id="weather">loading weather...</div>
    <div id="date"></div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();

      const parts = new Intl.DateTimeFormat([], {
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit'
      }).formatToParts(now);

      const hour = parts.find(p => p.type === 'hour')?.value || '--';
      const minute = parts.find(p => p.type === 'minute')?.value || '--';
      const second = parts.find(p => p.type === 'second')?.value || '--';
      const dayPeriod = parts.find(p => p.type === 'dayPeriod')?.value || '';

      document.getElementById('time').innerHTML =
        `${hour}<span class="colon">:</span>${minute}<span id="seconds">${second}</span>`;

      document.getElementById('date').textContent =
        now.toLocaleDateString([], {
          weekday: 'long',
          month: 'long',
          day: 'numeric'
        }) + (dayPeriod ? ` · ${dayPeriod}` : '');
    }

    async function updateWeather() {
      try {
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=34.2542&longitude=-110.0298&current=temperature_2m,weather_code&temperature_unit=fahrenheit';
        const res = await fetch(url);
        const data = await res.json();

        const codeMap = {
          0: 'Clear',
          1: 'Mostly clear',
          2: 'Partly cloudy',
          3: 'Overcast',
          45: 'Fog',
          48: 'Rime fog',
          51: 'Light drizzle',
          53: 'Drizzle',
          55: 'Heavy drizzle',
          61: 'Light rain',
          63: 'Rain',
          65: 'Heavy rain',
          71: 'Light snow',
          73: 'Snow',
          75: 'Heavy snow',
          80: 'Rain showers',
          81: 'Rain showers',
          82: 'Heavy showers',
          95: 'Thunderstorm'
        };

        const temp = Math.round(data.current.temperature_2m);
        const desc = codeMap[data.current.weather_code] || 'Weather';

        document.getElementById('weather').textContent = `${temp}°F · ${desc}`;
      } catch (e) {
        document.getElementById('weather').textContent = 'weather unavailable';
      }
    }

    updateTime();
    updateWeather();

    setInterval(updateTime, 1000);
    setInterval(updateWeather, 600000);
  </script>
</body>
</html>
