<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Amber Clock</title>

  <style>
    :root {
      --bg: #080402;
      --panel: #130805;
      --amber: #ff7a18;
      --amber-core: #ff9a2f;
      --amber-hot: #ffb15c;
      --amber-dim: #9c4818;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 40%, #1a0b05 0%, #080402 62%, #020100 100%);
      color: var(--amber);
      font-family: ui-monospace, Menlo, Consolas, monospace;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* coarse old-display pixel grid */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,110,20,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,110,20,0.08) 1px, transparent 1px);
      background-size: 9px 9px;
      opacity: 0.26;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.72) 100%);
    }

    #app {
      width: min(92vw, 1100px);
      padding: clamp(24px, 5vw, 60px);
      text-align: center;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,120,35,0.08), rgba(0,0,0,0.45)),
        var(--panel);
      border: 1px solid rgba(255,112,24,0.26);
      box-shadow:
        0 0 24px rgba(255,90,20,0.22),
        inset 0 0 36px rgba(255,100,20,0.08),
        0 30px 80px rgba(0,0,0,0.82);
      position: relative;
    }

    #display {
      position: relative;
      padding: clamp(16px, 3vw, 34px);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255,120,35,0.06), rgba(0,0,0,0.22)),
        #100603;
      box-shadow:
        inset 0 0 34px rgba(255,100,20,0.08),
        inset 0 0 4px rgba(255,170,80,0.12);
      overflow: hidden;
    }

    /* grid only over the lit display face */
    #display::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,95,18,0.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,95,18,0.11) 1px, transparent 1px);
      background-size: 7px 7px;
      opacity: 0.32;
      mix-blend-mode: multiply;
    }

    #label {
      color: var(--amber-dim);
      font-size: clamp(12px, 1.5vw, 20px);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 1.5vw;
      opacity: 0.72;
    }

    #time {
      font-size: clamp(80px, 15vw, 200px);
      letter-spacing: -0.06em;
      line-height: 0.95;
      color: var(--amber-hot);
      text-shadow:
        0 0 2px rgba(255,170,70,1),
        0 0 7px rgba(255,115,24,0.95),
        0 0 16px rgba(255,82,10,0.72),
        0 0 32px rgba(255,62,0,0.42),
        0 0 58px rgba(180,40,0,0.25);
      filter: contrast(1.18) saturate(1.18);
      position: relative;
      z-index: 1;
    }

    #seconds {
      font-size: 0.32em;
      opacity: 0.72;
      margin-left: 0.2em;
    }

    #weather {
      margin-top: clamp(16px, 2.5vw, 30px);
      font-size: clamp(20px, 4vw, 48px);
      color: var(--amber-core);
      opacity: 0.84;
      text-shadow:
        0 0 4px rgba(255,120,35,0.85),
        0 0 14px rgba(255,75,10,0.45);
      position: relative;
      z-index: 1;
    }

    #date {
      margin-top: 10px;
      font-size: clamp(14px, 2vw, 26px);
      color: var(--amber-dim);
      opacity: 0.74;
      letter-spacing: 0.08em;
      position: relative;
      z-index: 1;
    }

    .colon {
      animation: blink 2s steps(1, end) infinite;
    }

    @keyframes blink {
      50% { opacity: 0.22; }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="display">
      <div id="label">digital chronometer</div>
      <div id="time">--<span class="colon">:</span>--<span id="seconds">--</span></div>
      <div id="weather">loading weather...</div>
      <div id="date"></div>
    </div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();

      const parts = new Intl.DateTimeFormat([], {
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit'
      }).formatToParts(now);

      const h = parts.find(p => p.type === 'hour')?.value || '--';
      const m = parts.find(p => p.type === 'minute')?.value || '--';
      const s = parts.find(p => p.type === 'second')?.value || '--';
      const ap = parts.find(p => p.type === 'dayPeriod')?.value || '';

      document.getElementById('time').innerHTML =
        `${h}<span class="colon">:</span>${m}<span id="seconds">${s}</span>`;

      document.getElementById('date').textContent =
        now.toLocaleDateString([], {
          weekday: 'long',
          month: 'long',
          day: 'numeric'
        }) + (ap ? ` · ${ap}` : '');
    }

    async function updateWeather() {
      try {
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=34.2542&longitude=-110.0298&current=temperature_2m,weather_code&temperature_unit=fahrenheit';
        const res = await fetch(url);
        const data = await res.json();

        const codeMap = {
          0: 'Clear', 1: 'Mostly clear', 2: 'Partly cloudy', 3: 'Overcast',
          45: 'Fog', 48: 'Rime fog', 51: 'Light drizzle', 53: 'Drizzle', 55: 'Heavy drizzle',
          61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
          71: 'Light snow', 73: 'Snow', 75: 'Heavy snow',
          80: 'Rain showers', 81: 'Rain showers', 82: 'Heavy showers',
          95: 'Thunderstorm'
        };

        const temp = Math.round(data.current.temperature_2m);
        const desc = codeMap[data.current.weather_code] || 'Weather';

        document.getElementById('weather').textContent =
          `${temp}°F · ${desc}`;
      } catch {
        document.getElementById('weather').textContent = 'weather unavailable';
      }
    }

    updateTime();
    updateWeather();

    setInterval(updateTime, 1000);
    setInterval(updateWeather, 600000);
  </script>
</body>
</html>
