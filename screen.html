<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Amber Clock</title>

  <style>
    :root {
      --bg: #080402;
      --panel: #130805;
      --amber: #ff7a18;
      --amber-core: #ff9a2f;
      --amber-hot: #ffb15c;
      --amber-dim: #9c4818;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 40%, #1a0b05 0%, #080402 62%, #020100 100%);
      color: var(--amber);
      font-family: ui-monospace, Menlo, Consolas, monospace;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,110,20,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,110,20,0.08) 1px, transparent 1px);
      background-size: 9px 9px;
      opacity: 0.26;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.72) 100%);
    }

    #app {
      width: min(94vw, 1280px);
      padding: clamp(18px, 3.5vw, 46px);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,120,35,0.08), rgba(0,0,0,0.45)),
        var(--panel);
      border: 1px solid rgba(255,112,24,0.26);
      box-shadow:
        0 0 24px rgba(255,90,20,0.22),
        inset 0 0 36px rgba(255,100,20,0.08),
        0 30px 80px rgba(0,0,0,0.82);
      position: relative;
    }

    #display {
      display: grid;
      grid-template-columns: 1fr minmax(220px, 0.34fr);
      gap: clamp(16px, 3vw, 34px);
      position: relative;
      padding: clamp(16px, 3vw, 34px);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255,120,35,0.06), rgba(0,0,0,0.22)),
        #100603;
      box-shadow:
        inset 0 0 34px rgba(255,100,20,0.08),
        inset 0 0 4px rgba(255,170,80,0.12);
      overflow: hidden;
    }

    #display::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,95,18,0.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,95,18,0.11) 1px, transparent 1px);
      background-size: 7px 7px;
      opacity: 0.32;
      mix-blend-mode: multiply;
    }

    #main,
    #wind-panel {
      position: relative;
      z-index: 1;
    }

    #main {
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #wind-panel {
      border-left: 1px solid rgba(255,112,24,0.22);
      padding-left: clamp(14px, 2vw, 28px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    #label,
    #wind-label {
      color: var(--amber-dim);
      font-size: clamp(13px, 1.5vw, 22px);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 1.5vw;
      opacity: 0.72;
    }

    #time {
      font-size: clamp(74px, 13vw, 180px);
      letter-spacing: -0.06em;
      line-height: 0.95;
      color: var(--amber-hot);
      text-shadow:
        0 0 2px rgba(255,170,70,1),
        0 0 7px rgba(255,115,24,0.95),
        0 0 16px rgba(255,82,10,0.72),
        0 0 32px rgba(255,62,0,0.42),
        0 0 58px rgba(180,40,0,0.25);
      filter: contrast(1.18) saturate(1.18);
    }

    #seconds {
      font-size: 0.32em;
      opacity: 0.72;
      margin-left: 0.2em;
    }

    #weather {
      margin-top: clamp(16px, 2.5vw, 30px);
      font-size: clamp(20px, 3.2vw, 44px);
      color: var(--amber-core);
      opacity: 0.84;
      text-shadow:
        0 0 4px rgba(255,120,35,0.85),
        0 0 14px rgba(255,75,10,0.45);
    }

    #date {
      margin-top: 10px;
      font-size: clamp(14px, 1.7vw, 24px);
      color: var(--amber-dim);
      opacity: 0.74;
      letter-spacing: 0.08em;
    }

    .colon {
      animation: blink 2s steps(1, end) infinite;
    }

    @keyframes blink {
      50% { opacity: 0.22; }
    }

    #compass {
      width: min(18vw, 180px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(255,122,24,0.55);
      position: relative;
      box-shadow:
        0 0 18px rgba(255,90,20,0.22),
        inset 0 0 28px rgba(255,90,20,0.08);
      margin-bottom: clamp(14px, 2vw, 24px);
    }

    #compass::before {
      content: "";
      position: absolute;
      inset: 13%;
      border-radius: 50%;
      border: 1px dashed rgba(255,122,24,0.28);
    }

    .dir {
      position: absolute;
      color: var(--amber-dim);
      font-size: clamp(14px, 1.8vw, 22px);
      text-shadow: 0 0 8px rgba(255,90,20,0.35);
    }

    .n { top: 6%; left: 50%; transform: translateX(-50%); }
    .e { right: 8%; top: 50%; transform: translateY(-50%); }
    .s { bottom: 6%; left: 50%; transform: translateX(-50%); }
    .w { left: 8%; top: 50%; transform: translateY(-50%); }

    #needle {
      position: absolute;
      inset: 12%;
      transform: rotate(0deg);
      transition: transform 800ms ease;
    }

    #needle::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 8%;
      width: 4px;
      height: 45%;
      transform: translateX(-50%);
      border-radius: 999px;
      background: var(--amber-hot);
      box-shadow:
        0 0 5px rgba(255,170,70,1),
        0 0 16px rgba(255,82,10,0.72),
        0 0 32px rgba(255,62,0,0.38);
    }

    #needle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 13px;
      height: 13px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: var(--amber-core);
      box-shadow: 0 0 14px rgba(255,90,20,0.7);
    }

    #wind-speed {
      color: var(--amber-hot);
      font-size: clamp(28px, 4vw, 58px);
      line-height: 1;
      text-shadow:
        0 0 4px rgba(255,120,35,0.85),
        0 0 18px rgba(255,75,10,0.48);
    }

    #wind-dir {
      margin-top: 10px;
      color: var(--amber-dim);
      font-size: clamp(18px, 2.2vw, 30px);
      letter-spacing: 0.08em;
    }

    @media (max-width: 760px) {
      #display {
        grid-template-columns: 1fr;
      }

      #wind-panel {
        border-left: 0;
        border-top: 1px solid rgba(255,112,24,0.22);
        padding-left: 0;
        padding-top: 24px;
      }

      #compass {
        width: min(48vw, 220px);
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="display">
      <div id="main">
        <div id="label">digital chronometer</div>
        <div id="time">--<span class="colon">:</span>--<span id="seconds">--</span></div>
        <div id="weather">loading weather...</div>
        <div id="date"></div>
      </div>

      <div id="wind-panel">
        <div id="wind-label">wind</div>

        <div id="compass">
          <div class="dir n">W</div>
          <div class="dir e">N</div>
          <div class="dir s">E</div>
          <div class="dir w">S</div>
          <div id="needle"></div>
        </div>

        <div id="wind-speed">-- mph</div>
        <div id="wind-dir">---°</div>
      </div>
    </div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();

      const parts = new Intl.DateTimeFormat([], {
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit'
      }).formatToParts(now);

      const h = parts.find(p => p.type === 'hour')?.value || '--';
      const m = parts.find(p => p.type === 'minute')?.value || '--';
      const s = parts.find(p => p.type === 'second')?.value || '--';
      const ap = parts.find(p => p.type === 'dayPeriod')?.value || '';

      document.getElementById('time').innerHTML =
        `${h}<span class="colon">:</span>${m}<span id="seconds">${s}</span>`;

      document.getElementById('date').textContent =
        now.toLocaleDateString([], {
          weekday: 'long',
          month: 'long',
          day: 'numeric'
        }) + (ap ? ` · ${ap}` : '');
    }

    function compassLabel(degrees) {
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE',
                    'S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(degrees / 22.5) % 16];
    }

    async function updateWeather() {
      try {
        const url =
          'https://api.open-meteo.com/v1/forecast' +
          '?latitude=34.2542' +
          '&longitude=-110.0298' +
          '&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m' +
          '&temperature_unit=fahrenheit' +
          '&wind_speed_unit=mph';

        const res = await fetch(url);
        const data = await res.json();

        const codeMap = {
          0: 'Clear', 1: 'Mostly clear', 2: 'Partly cloudy', 3: 'Overcast',
          45: 'Fog', 48: 'Rime fog', 51: 'Light drizzle', 53: 'Drizzle', 55: 'Heavy drizzle',
          61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
          71: 'Light snow', 73: 'Snow', 75: 'Heavy snow',
          80: 'Rain showers', 81: 'Rain showers', 82: 'Heavy showers',
          95: 'Thunderstorm'
        };

        const temp = Math.round(data.current.temperature_2m);
        const desc = codeMap[data.current.weather_code] || 'Weather';
        const windSpeed = Math.round(data.current.wind_speed_10m);
        const windDirection = Math.round(data.current.wind_direction_10m);
        const windName = compassLabel(windDirection);

        document.getElementById('weather').textContent =
          `${temp}°F · ${desc}`;

        document.getElementById('wind-speed').textContent =
          `${windSpeed} mph`;

        document.getElementById('wind-dir').textContent =
          `${windName} · ${windDirection}°`;

        document.getElementById('needle').style.transform =
          `rotate(${windDirection - 270}deg)`;
      } catch {
        document.getElementById('weather').textContent = 'weather unavailable';
        document.getElementById('wind-speed').textContent = '-- mph';
        document.getElementById('wind-dir').textContent = 'unavailable';
      }
    }

    updateTime();
    updateWeather();

    setInterval(updateTime, 1000);
    setInterval(updateWeather, 60000);
  </script>
</body>
</html>
