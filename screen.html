<html>
  <body style="margin:0; background:#111; color:#eee; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:sans-serif;">
    <div id="app">
      <div style="text-align:center">
        <div style="font-size:10vw;">Hey whatup</div>
        <div style="font-size:3vw; opacity:.7;">surface brain online</div>
      </div>
    </div>

    <script>
      async function refreshApp() {
        try {
          const res = await fetch('/?t=' + Date.now(), { cache: 'no-store' });
          const text = await res.text();
          const doc = new DOMParser().parseFromString(text, 'text/html');
          const newApp = doc.querySelector('#app');
          const app = document.querySelector('#app');

          if (newApp && app && app.innerHTML !== newApp.innerHTML) {
            app.innerHTML = newApp.innerHTML;
          }
        } catch (e) {
          console.log('refresh failed', e);
        }
      }

      setInterval(refreshApp, 1000);
    </script>
  </body>
</html>
