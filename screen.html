<html>
  <body style="margin:0; background:#111; color:#eee; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:sans-serif;">
    <div id="app" style="text-align:center">
      <div id="time" style="font-size:10vw;"></div>
      <div id="weather" style="font-size:4vw; opacity:.75;">loading weather...</div>
    </div>

    <script>
      function updateTime() {
        const now = new Date();
        document.getElementById('time').textContent =
          now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      }

      async function updateWeather() {
        try {
          const res = await fetch('https://wttr.in/Show+Low?format=%t+%C');
          const text = await res.text();
          document.getElementById('weather').textContent = text.trim();
        } catch (e) {
          document.getElementById('weather').textContent = 'weather unavailable';
        }
      }

      updateTime();
      updateWeather();
      setInterval(updateTime, 1000);
      setInterval(updateWeather, 600000);
    </script>
  </body>
</html>
